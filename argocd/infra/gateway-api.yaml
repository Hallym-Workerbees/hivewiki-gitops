apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-green
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Hallym-Workerbees/hivewiki-gitops
    targetRevision: main
    path: infra/gateway-api

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
