apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://github.com/Hallym-Workerbees/hivewiki-gitops
      targetRevision: main
      ref: values

    - repoURL: https://bitnami-labs.github.io/sealed-secrets/
      chart: sealed-secrets
      targetRevision: 2.18.5
      helm:
        releaseName: sealed-secrets
        valueFiles:
          - $values/infra/sealed-secrets/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
