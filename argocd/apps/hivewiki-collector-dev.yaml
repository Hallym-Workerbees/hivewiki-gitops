apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hivewiki-collector-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Hallym-Workerbees/hivewiki-gitops
    targetRevision: main
    path: apps/hivewiki-collector/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: hivewiki-collector-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
