apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hivewiki-root
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://github.com/Hallym-Workerbees/hivewiki-gitops
      targetRevision: main
      path: argocd/apps
      directory:
        recurse: true

    - repoURL: https://github.com/Hallym-Workerbees/hivewiki-gitops
      targetRevision: main
      path: argocd/infra
      directory:
        recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
