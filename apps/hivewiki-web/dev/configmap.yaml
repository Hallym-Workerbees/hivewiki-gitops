apiVersion: v1
kind: ConfigMap
metadata:
  name: hivewiki-web-dev-env
  namespace: hivewiki-web-dev
data:
  DJANGO_DEBUG: "False"
  DJANGO_LOG_JSON: "True"
  DJANGO_LOG_LEVEL: "INFO"

  DJANGO_ALLOWED_HOSTS: "test.hive-wiki.com"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://test.hive-wiki.com"
  DJANGO_CLIENT_IP_HEADER: "HTTP_X_FORWARDED_FOR"
  DJANGO_SECURE_PROXY_SSL_HEADER: "HTTP_X_FORWARDED_PROTO,https"

  DJANGO_SESSION_COOKIE_SECURE: "True"
  DJANGO_SESSION_COOKIE_SAMESITE: "Lax"
  DJANGO_CSRF_COOKIE_SECURE: "True"
  DJANGO_CSRF_COOKIE_SAMESITE: "Lax"

  DJANGO_SECURE_SSL_REDIRECT: "True"
  DJANGO_SECURE_HSTS_SECONDS: "31536000"
  DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
  DJANGO_SECURE_HSTS_PRELOAD: "True"
  DJANGO_SECURE_CONTENT_TYPE_NOSNIFF: "True"
  DJANGO_X_FRAME_OPTIONS: "DENY"

  LOGIN_RATE_LIMIT_ATTEMPTS: "5"
  LOGIN_RATE_LIMIT_WINDOW_SECONDS: "300"
  SESSION_COOKIE_AGE: "1209600"
